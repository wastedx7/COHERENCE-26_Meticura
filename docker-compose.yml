version: '3.8'

services:
  # =========================================
  # PostgreSQL Database
  # =========================================
  postgres:
    image: postgres:15-alpine
    container_name: budget_watchdog_postgres
    environment:
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_password
      POSTGRES_DB: budget_watchdog
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/database/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_watchdog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget_watchdog_network

  # =========================================
  # Redis Cache & Message Broker
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: budget_watchdog_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget_watchdog_network

  # =========================================
  # FastAPI Backend
  # =========================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_backend
    environment:
      DATABASE_URL: postgresql://budget_user:budget_password@postgres:5432/budget_watchdog
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_JWT_VERIFICATION_KEY: ${CLERK_JWT_VERIFICATION_KEY}
      LOG_LEVEL: INFO
      PROJECT_NAME: Budget Watchdog API
      API_V1_PREFIX: /api
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
      - ./Backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - budget_watchdog_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # =========================================
  # Celery Worker
  # =========================================
  celery_worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_celery_worker
    environment:
      DATABASE_URL: postgresql://budget_user:budget_password@postgres:5432/budget_watchdog
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      LOG_LEVEL: INFO
    volumes:
      - ./Backend:/app
      - ./Backend/logs:/app/logs
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - budget_watchdog_network
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=4

  # =========================================
  # Celery Beat (Scheduler)
  # =========================================
  celery_beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_celery_beat
    environment:
      DATABASE_URL: postgresql://budget_user:budget_password@postgres:5432/budget_watchdog
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      LOG_LEVEL: INFO
    volumes:
      - ./Backend:/app
      - ./Backend/logs:/app/logs
      - celery_beat_schedule:/app/celery_beat_schedule
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - budget_watchdog_network
    command: celery -A celery_app.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # =========================================
  # React Frontend
  # =========================================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    container_name: budget_watchdog_frontend
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    depends_on:
      - backend
    networks:
      - budget_watchdog_network
    command: npm run dev

  # =========================================
  # Adminer (Database UI) - Optional
  # =========================================
  adminer:
    image: adminer:latest
    container_name: budget_watchdog_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - budget_watchdog_network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # =========================================
  # Flower (Celery UI) - Optional
  # =========================================
  flower:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_flower
    ports:
      - "5555:5555"
    volumes:
      - ./Backend:/app
    depends_on:
      - redis
      - celery_worker
    networks:
      - budget_watchdog_network
    command: celery -A celery_app.celery_app flower --port=5555 --broker=redis://redis:6379/1

# =========================================
# Volumes
# =========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  celery_beat_schedule:
    driver: local

# =========================================
# Networks
# =========================================
networks:
  budget_watchdog_network:
    driver: bridge
