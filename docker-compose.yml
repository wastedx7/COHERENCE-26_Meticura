version: '3.8'

services:
  # =========================================
  # Redis Cache & Message Broker
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: budget_watchdog_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget_watchdog_network

  # =========================================
  # FastAPI Backend
  # =========================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars}
      LOG_LEVEL: INFO
      PROJECT_NAME: Budget Watchdog API
      API_V1_PREFIX: /api
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://frontend:3000","http://frontend:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
      - ./Backend/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - budget_watchdog_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # =========================================
  # Celery Worker
  # =========================================
  celery_worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars}
      LOG_LEVEL: INFO
    volumes:
      - ./Backend:/app
      - ./Backend/logs:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - budget_watchdog_network
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=4

  # =========================================
  # Celery Beat (Scheduler)
  # =========================================
  celery_beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars}
      LOG_LEVEL: INFO
    volumes:
      - ./Backend:/app
      - ./Backend/logs:/app/logs
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - budget_watchdog_network
    command: celery -A celery_app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule

  # =========================================
  # React Frontend (development)
  # =========================================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: development
    container_name: budget_watchdog_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - budget_watchdog_network

  # =========================================
  # Flower (Celery UI) - Optional
  # =========================================
  flower:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: budget_watchdog_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./Backend:/app
    depends_on:
      - redis
      - celery_worker
    networks:
      - budget_watchdog_network
    command: celery -A celery_app.celery_app flower --port=5555 --broker=redis://redis:6379/1

# =========================================
# Volumes
# =========================================
volumes:
  redis_data:
    driver: local

# =========================================
# Networks
# =========================================
networks:
  budget_watchdog_network:
    driver: bridge
